name: Bygg APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Konfigurera Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Hanterar Gradle wrapper automatiskt — ingen gradle-wrapper.jar behövs i repot
      - name: Konfigurera Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Bygg debug-APK
        run: gradle assembleDebug

      - name: Ladda upp APK som artefakt
        uses: actions/upload-artifact@v4
        with:
          name: brandstation-larm-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
